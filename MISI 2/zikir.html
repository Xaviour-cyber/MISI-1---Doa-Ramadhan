<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Hitung zikir harian Ramadhan — counter interaktif dengan target dan notifikasi.">
    <title>Hitung Zikir — Ramadhan</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        forest: { DEFAULT: '#14532d', deep: '#0a2e18', light: '#166534' },
                        sage: { DEFAULT: '#f0faf3' },
                        gold: { DEFAULT: '#ca8a04', bright: '#eab308' },
                        sand: { warm: '#fef3c7' },
                    },
                    fontFamily: {
                        sans: ['"Poppins"', 'system-ui', 'sans-serif'],
                        heading: ['"League Spartan"', 'system-ui', 'sans-serif'],
                        arab: ['"Amiri"', 'serif'],
                    },
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@500;600;700;800&family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300;1,400&family=Amiri:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="font-sans bg-white text-stone-600 min-h-screen flex flex-col leading-relaxed">

    <header class="header-bg text-white">
        <div class="max-w-4xl mx-auto px-6 md:px-10 py-10 md:py-16 text-center relative overflow-hidden">
            <div
                class="absolute top-6 left-8 md:top-12 md:left-16 text-gold-bright/10 text-5xl md:text-7xl -rotate-12 pointer-events-none">
                🌙</div>
            <div
                class="absolute bottom-6 right-8 md:bottom-12 md:right-16 text-gold-bright/10 text-4xl md:text-6xl rotate-12 pointer-events-none">
                ✨</div>
            <nav class="flex justify-center gap-4 mb-6 relative z-10">
                <a href="../MISI 1/index.html"
                    class="text-white/40 text-[0.7rem] md:text-xs tracking-wider uppercase hover:text-white/70 transition-colors">Doa</a>
                <span class="text-white/20">|</span>
                <a href="zikir.html"
                    class="text-gold-bright text-[0.7rem] md:text-xs tracking-wider uppercase font-semibold">Zikir</a>
            </nav>
            <h1 class="font-heading text-2xl md:text-4xl font-extrabold leading-none mb-3 tracking-tight relative z-10">
                Hitung Zikir
            </h1>
            <p class="text-white/35 text-[0.75rem] md:text-[0.8rem] max-w-md mx-auto leading-[1.7] relative z-10">
                Hitung dzikir harianmu dengan mudah. Pilih target, mulai menghitung, dan raih pahalanya.
            </p>
        </div>
    </header>

    <main class="flex-1 flex items-center justify-center px-5 md:px-10 py-10 md:py-16">
        <div class="w-full max-w-sm">

            <section class="text-center mb-8">
                <h2 class="sr-only">Counter Zikir</h2>

                <div class="relative inline-block mb-6">
                    <svg class="progress-ring w-52 h-52 md:w-64 md:h-64 mx-auto" viewBox="0 0 200 200">
                        <circle cx="100" cy="100" r="88" fill="none" stroke="#e7e5e4" stroke-width="6" />
                        <circle id="progressCircle" cx="100" cy="100" r="88" fill="none" stroke="#14532d"
                            stroke-width="6" stroke-linecap="round" stroke-dasharray="553" stroke-dashoffset="553"
                            transform="rotate(-90 100 100)" class="transition-all duration-300" />
                    </svg>
                    <div class="absolute inset-0 flex flex-col items-center justify-center">
                        <span id="counter"
                            class="font-heading text-6xl md:text-7xl font-extrabold text-forest leading-none">0</span>
                        <span class="text-stone-400 text-[0.65rem] tracking-wider mt-1">dari <span
                                id="targetLabel">33</span></span>
                    </div>
                </div>

                <div id="badge" class="badge-notif hidden mb-5">
                    <div
                        class="inline-flex items-center gap-1.5 bg-gold/10 border border-gold/30 text-gold px-4 py-2 rounded-full text-xs font-semibold">
                        <span>🎉</span>
                        <span>Target tercapai! Alhamdulillah</span>
                    </div>
                </div>
            </section>

            <section class="mb-8">
                <h2 class="sr-only">Tombol Kontrol</h2>

                <div class="flex flex-col items-center gap-4">
                    <button id="btnTambah"
                        class="btn-tambah w-20 h-20 md:w-24 md:h-24 rounded-full bg-forest text-white text-3xl md:text-4xl font-bold shadow-lg shadow-forest/30 active:scale-90 transition-transform duration-150 select-none">
                        +
                    </button>

                    <button id="btnReset"
                        class="text-stone-400 text-[0.7rem] tracking-wider uppercase hover:text-stone-600 transition-colors select-none py-2 px-4">
                        ↻ Ulangi
                    </button>
                </div>
            </section>

            <section class="mb-4">
                <h2 class="sr-only">Pilih Target</h2>
                <div class="flex justify-center gap-2">
                    <button
                        class="btn-target target-active text-[0.7rem] md:text-xs font-semibold px-4 py-1.5 rounded-lg transition-all"
                        data-target="33">
                        33×
                    </button>
                    <button
                        class="btn-target text-[0.7rem] md:text-xs font-semibold px-4 py-1.5 rounded-lg transition-all"
                        data-target="100">
                        100×
                    </button>
                    <button
                        class="btn-target text-[0.7rem] md:text-xs font-semibold px-4 py-1.5 rounded-lg transition-all"
                        data-target="1000">
                        1000×
                    </button>
                </div>
            </section>

        </div>
    </main>

    <footer class="bg-forest-deep text-center py-8 md:py-10 px-6 relative overflow-hidden">
        <div class="absolute -top-10 -left-10 text-white/[0.03] text-8xl pointer-events-none rotate-45">✨</div>
        <div class="absolute -bottom-10 -right-10 text-white/[0.03] text-8xl pointer-events-none -rotate-12">🌙</div>
        <div class="relative z-10">
            <p class="text-white text-[0.6rem] md:text-[0.65rem] tracking-wider mb-2">&copy; 2026 KOLEKSI DOA RAMADHAN
            </p>
            <p class="text-white/60 text-[0.5rem] md:text-[0.55rem] italic">Semoga ibadah Puasa kita diterima. Amin.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>

</html>
